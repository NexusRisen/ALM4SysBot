name: Build and Release

on:
  push:
    paths:
      - "Directory.Build.props"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.x'
      - name: Restore dependencies
        run: dotnet restore PKHeX-Plugins.sln
      - name: Build
        run: dotnet build PKHeX-Plugins.sln -c Release --no-restore
      - name: Test
        run: dotnet test AutoModTests/AutoModTests.csproj -c Release --no-build
      - name: Extract version
        id: ver
        shell: bash
        run: |
          version=$(grep -oP '<Version>\K[^<]+' Directory.Build.props)
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v${{ steps.ver.outputs.version }}"
          name: "AutoLegalityMod ${{ steps.ver.outputs.version }}"
          body: "Automated release for version ${{ steps.ver.outputs.version }}"
          files: |
            AutoLegalityMod/bin/Release/net9.0-windows/AutoModPlugins.dll
            PKHeX.Core.AutoMod/bin/Release/net9.0/PKHeX.Core.AutoMod.dll
